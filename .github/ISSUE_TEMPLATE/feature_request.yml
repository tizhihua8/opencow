name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature! Please describe your idea so we can evaluate it.

        > **Note:** Please write in English if possible, so that all community members can participate.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this feature solve? Is it related to a frustration?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the solution you'd like.
      placeholder: A clear description of what you want to happen.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or features you've considered?

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context, mockups, or screenshots about the feature request.

  - type: dropdown
    id: area
    attributes:
      label: Feature area
      options:
        - Agent / AI Engine
        - Issues & Task Management
        - Sessions & Chat
        - Scheduling
        - Browser / MCP
        - UI / UX
        - Integrations (Telegram, GitHub, etc.)
        - Other
