name: Release (Windows + Linux)

on:
  push:
    tags:
      - 'v*'

# Only one release build at a time
concurrency:
  group: release-win-linux-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10.13.1'

jobs:
  # ============================================================
  # Windows Build
  # ============================================================
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Compile TypeScript (MUST do before packaging) ────────────────
      - name: Build electron-vite artifacts
        run: pnpm exec electron-vite build

      # ── Build ─────────────────────────────────────────────────────────
      - name: Build Electron App (Windows)
        run: pnpm exec electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            dist/*.exe
            dist/*.zip
          retention-days: 5

  # ============================================================
  # Linux Build
  # ============================================================
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      # ── Install Linux build dependencies ──────────────────────────────
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-0 \
            libnotify4 \
            libnss3 \
            libxss1 \
            libxtst6 \
            xdg-utils \
            libatspi2.0-0 \
            libsecret-1-0 \
            libpython3-stdlib \
            libpython3.12 \
            libgcc-s1 \
            libwebkit2gtk-4.1-0 \
            libgbm1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Compile TypeScript (MUST do before packaging) ────────────────
      - name: Build electron-vite artifacts
        run: pnpm exec electron-vite build

      # ── Build ─────────────────────────────────────────────────────────
      - name: Build Electron App (Linux)
        run: pnpm exec electron-builder --linux AppImage --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            dist/*.AppImage
            dist/*.deb
          retention-days: 5

  # ============================================================
  # Create Release (合并所有平台的 artifacts)
  # ============================================================
  create-release:
    name: Create Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: List artifacts
        run: find dist/ -type f | head -50

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: OpenCow v${{ github.ref_name }}
          files: |
            dist/**/*.exe
            dist/**/*.zip
            dist/**/*.AppImage
            dist/**/*.deb
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-alpha') || contains(github.ref, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
